<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人對話書房</title>
    <style>
        :root {
            --paper-bg: #fdfaf5;
            --user-accent: #a63d40;
            --action-color: #8b7d6b;
            --transition-speed: 0.5s;
        }

        body {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: "Meiryo UI", "Meiryo", "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #2c2c2c; margin: 0; line-height: 2.2; min-height: 100vh;
            overflow-x: hidden;
        }

        .fade-in { animation: fadeIn var(--transition-speed) ease-out forwards; }
        .fade-out { animation: fadeOut var(--transition-speed) ease-in forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(1.02); }
        }

        #header {
            position: sticky; top: 0; background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(5px); border-bottom: 1px solid #e0d8cc;
            padding: 12px 20px; display: none; justify-content: space-between; align-items: center; z-index: 100;
        }

        #docTitle { font-size: 1.1em; font-weight: bold; color: #555; margin-right: auto; margin-left: 15px; }

        #welcome-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 90vh; text-align: center; padding: 20px;
        }
        #welcome-text { color: #8b7d6b; margin-bottom: 50px; letter-spacing: 2px; font-size: 0.95em; }

        #bookshelf { margin-top: 50px; width: 100%; max-width: 320px; text-align: left; }
        .shelf-title { font-size: 0.85em; color: #b0a496; border-bottom: 1px solid #e0d8cc; padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 1px; text-align: center; }
        .book-item {
            padding: 12px 15px; background: rgba(255,255,255,0.4); border: 1px solid #e0d8cc;
            border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .book-item:hover { background: #fff; border-color: var(--user-accent); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        #resume-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 200; justify-content: center; align-items: center;
            backdrop-filter: blur(2px);
        }
        
        .modal-content {
            background: var(--paper-bg); padding: 35px 30px; border-radius: 24px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); max-width: 280px;
        }

        .btn-red {
            background: var(--user-accent); color: white; border: none;
            padding: 10px 28px; border-radius: 25px; cursor: pointer;
            font-size: 1em; display: inline-block; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-red:hover { opacity: 0.9; transform: translateY(-1px); }
        #fileInput { display: none; }

        #content { max-width: 700px; margin: 40px auto; padding: 0 20px; display: none; }
        .msg { margin-bottom: 45px; }

        .speech-text, .narrative, .role-system { font-size: 1em; display: block; margin: 8px 0; white-space: pre-wrap; letter-spacing: 0.8px; }
        .narrative { color: var(--action-color); font-weight: 400; }
        .role-user .speech-text { color: var(--user-accent); font-weight: 500; }
        .role-others .speech-text { font-weight: 500; }
        
        .role-system { color: #b0a496; text-align: center; margin: 90px 0; letter-spacing: 2px; }
        .role-system::before, .role-system::after { content: " ——— "; opacity: 0.4; }
    </style>
</head>
<body>

<div id="resume-modal">
    <div class="modal-content">
        <p style="margin-bottom: 25px; color: #555; line-height: 1.6;">偵測到上次的閱讀進度，<br>要從那裡開始嗎？</p>
        <button id="confirm-resume" class="btn-red" style="margin-bottom: 15px; width: 100%;">繼續閱讀</button><br>
        <button id="cancel-resume" style="background:none; border:none; color:#b0a496; cursor:pointer; font-size: 0.9em;">從頭開始</button>
    </div>
</div>

<div id="welcome-screen" class="fade-in">
    <div id="welcome-text">「那些未曾忘卻的私語，都在這裡。」</div>
    
    <label for="fileInput" class="btn-red">尋找牠的蹤跡</label>
    <input type="file" id="fileInput" accept=".txt">

    <div id="bookshelf" style="display: none;">
        <div class="shelf-title">續寫我們的故事</div>
        <div id="book-list"></div>
    </div>
</div>

<div id="header">
    <button id="backToLibrary" class="btn-red" style="padding: 6px 16px; font-size: 0.85em;">回書房</button>
    <span id="docTitle"></span>
    <div style="width: 75px;"></div>
</div>

<div id="content" class="fade-in"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const welcomeScreen = document.getElementById('welcome-screen');
    const header = document.getElementById('header');
    const content = document.getElementById('content');
    const docTitle = document.getElementById('docTitle');
    const bookList = document.getElementById('book-list');
    const bookshelf = document.getElementById('bookshelf');
    const resumeModal = document.getElementById('resume-modal');

    let currentPerson = "";
    let autoDetectedPlayer = ""; 
    let roleColors = {};
    const colorPalette = ['#5d8aa8', '#4e6e5d', '#5a4a78', '#8b5a2b', '#3d5a80', '#6d597a'];

    window.onload = updateBookshelf;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentPerson = file.name.split('_')[0];
        docTitle.innerText = currentPerson;

        const reader = new FileReader();
        reader.onload = (ev) => {
            const rawData = ev.target.result;
            // 步驟 1: 先掃描第一筆資料自動辨識主角名
            autoDetectPlayer(rawData);
            // 步驟 2: 開始渲染
            render(rawData);
            saveToHistory(currentPerson);
            welcomeScreen.classList.add('fade-out');
            setTimeout(() => {
                switchToReadMode();
                checkResume();
            }, 500);
        };
        reader.readAsText(file);
    });

    function autoDetectPlayer(text) {
        // 搜尋第一個出現的名字 (格式: Name:)
        const firstMatch = text.match(/^\s*(.*?):\s*/m);
        if (firstMatch) {
            autoDetectedPlayer = firstMatch[1].trim();
            console.log("自動偵測主角:", autoDetectedPlayer);
        }
    }

    function updateBookshelf() {
        let history = JSON.parse(localStorage.getItem('library_history') || '{}');
        const names = Object.keys(history);
        if (names.length > 0) {
            bookshelf.style.display = 'block';
            bookList.innerHTML = '';
            names.reverse().forEach(name => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<span>${name}</span><small>${history[name].lastRead}</small>`;
                div.onclick = () => fileInput.click();
                bookList.appendChild(div);
            });
        }
    }

    function checkResume() {
        const savedPos = localStorage.getItem('pos_' + currentPerson);
        if (savedPos && parseInt(savedPos) > 150) {
            resumeModal.style.display = 'flex';
        }
    }

    document.getElementById('confirm-resume').onclick = () => {
        const savedPos = localStorage.getItem('pos_' + currentPerson);
        window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
        resumeModal.style.display = 'none';
    };

    document.getElementById('cancel-resume').onclick = () => resumeModal.style.display = 'none';

    document.getElementById('backToLibrary').onclick = () => {
        location.reload(); 
    };

    function switchToReadMode() {
        welcomeScreen.style.display = 'none';
        header.style.display = 'flex';
        content.style.display = 'block';
    }

    // 智慧段落篩選：分析 --- 分隔後的區塊，找出最有可能是人話的部分
    function getCleanMessage(rawMsg) {
        const chunks = rawMsg.split(/---|(?:\n|^)\s*\*\s*(?:\n|$)/g).map(c => c.trim()).filter(c => c.length > 0);
        if (chunks.length <= 1) return chunks[0] || "";

        let bestChunk = chunks[0];
        let maxScore = -1;

        chunks.forEach(chunk => {
            let score = 0;
            if (chunk.includes('「') || chunk.includes('」')) score += 50;
            if (chunk.includes('*')) score += 30;
            score += chunk.length * 0.4; 
            
            // 扣分項：如果是純數字或含系統關鍵字
            if (/^[\d\s\W]+$/.test(chunk)) score -= 60;
            if (/\[.*?\]|HP:|Status:|Lv\./i.test(chunk)) score -= 40;

            if (score > maxScore) {
                maxScore = score;
                bestChunk = chunk;
            }
        });
        return bestChunk;
    }

    function render(rawText) {
        content.innerHTML = '';
        roleColors = {};
        
        // 分割時間戳區塊
        const blocks = rawText.split(/\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\]/g);
        blocks.forEach(fullContent => {
            if (!fullContent.trim()) return;
            
            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            if (match) {
                const name = match[1].trim();
                let rawMsg = match[2].trim();
                
                rawMsg = getCleanMessage(rawMsg);

                const isUser = (name === autoDetectedPlayer);
                const isSystem = /system|environment/i.test(name);
                const div = document.createElement('div');
                div.className = 'msg';
                
                if (isSystem) {
                    div.className = 'role-system';
                    div.innerText = rawMsg.replace(/[\*\(\)]/g, '').trim(); 
                } else {
                    const roleColor = isUser ? 'var(--user-accent)' : getRoleColor(name);
                    div.classList.add(isUser ? 'role-user' : 'role-others');
                    div.innerHTML = processText(rawMsg, roleColor, isUser);
                }
                content.appendChild(div);
            }
        });

        window.onscroll = () => {
            if (currentPerson) localStorage.setItem('pos_' + currentPerson, window.scrollY);
        };
    }

    function saveToHistory(name) {
        let history = JSON.parse(localStorage.getItem('library_history') || '{}');
        history[name] = { lastRead: new Date().toLocaleDateString() };
        localStorage.setItem('library_history', JSON.stringify(history));
    }

    function getRoleColor(name) {
        if (!roleColors[name]) roleColors[name] = colorPalette[Object.keys(roleColors).length % colorPalette.length];
        return roleColors[name];
    }

    function processText(text, roleColor, isUser) {
        const segments = text.split(/(\*[\s\S]*?\*)/g);
        
        return segments.map(seg => {
            if (!seg || !seg.trim()) return '';
            
            if (seg.startsWith('*') && seg.endsWith('*')) {
                const cleanText = seg.replace(/^\*|\*$/g, '').replace(/[\(\)]/g, '').trim(); 
                return `<span class="narrative">${cleanText}</span>`;
            }

            if (isUser) {
                return `<div class="speech-text" style="color: ${roleColor}">${seg.trim()}</div>`;
            } else {
                const subSegments = seg.split(/(「[\s\S]*?」)/g);
                return subSegments.map(sub => {
                    if (!sub || !sub.trim()) return '';
                    if (sub.startsWith('「') && sub.endsWith('」')) {
                        return `<div class="speech-text" style="color: ${roleColor}">${sub.slice(1, -1).trim()}</div>`;
                    } else {
                        return `<span class="narrative">${sub.trim()}</span>`;
                    }
                }).join('');
            }
        }).join('');
    }
</script>
</body>
</html>
