<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對話小說閱讀器</title>
    <style>
        :root {
            --paper-bg: #fdfaf5;
            --user-accent: #a63d40; /* 尹昀晞：緋紅色 */
            --action-color: #8b7d6b; /* 動作描述：咖啡色 */
        }

        body {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: "Meiryo UI", "Meiryo", "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #2c2c2c; margin: 0; line-height: 2.2;
        }

        #header {
            position: sticky; top: 0; background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(5px); border-bottom: 1px solid #e0d8cc;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        /* 檔案標題樣式 */
        #docTitle {
            font-size: 1.1em;
            font-weight: bold;
            color: #555;
            margin-right: auto;
            margin-left: 15px;
        }

        /* 統一按鈕樣式 */
        .custom-file-upload, #scrollBtn {
            background: var(--user-accent);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            display: inline-block;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .custom-file-upload:hover, #scrollBtn:hover { opacity: 0.8; }
        #fileInput { display: none; } /* 隱藏原始醜陋按鈕 */

        #content { max-width: 700px; margin: 60px auto; padding: 0 20px; text-align: left; }

        .msg { margin-bottom: 40px; text-align: left; opacity: 0; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* 全文字大小統一為 1em */
        .speech-text, .narrative, .role-system {
            font-size: 1em; 
            display: block;
            margin: 8px 0;
            font-style: normal;
            white-space: pre-wrap;
            letter-spacing: 0.8px;
        }

        .narrative { color: var(--action-color); font-weight: 400; }
        .role-others .speech-text { font-weight: 500; }
        .role-user .speech-text { color: var(--user-accent); font-weight: 500; }
        .role-user .narrative { color: var(--action-color); opacity: 0.9; }

        /* 環境描述 */
        .role-system { 
            color: #b0a496; 
            text-align: center;
            margin: 80px 0; 
        }
        .role-system::before, .role-system::after { content: " ——— "; opacity: 0.5; }
    </style>
</head>
<body>

<div id="header">
    <label for="fileInput" class="custom-file-upload">選擇檔案</label>
    <input type="file" id="fileInput" accept=".txt">
    <span id="docTitle"></span>
    <button id="scrollBtn" style="display:none;">續讀</button>
</div>

<div id="content"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const docTitle = document.getElementById('docTitle');
    const content = document.getElementById('content');
    const colorPalette = ['#5d8aa8', '#4e6e5d', '#5a4a78', '#8b5a2b', '#3d5a80', '#6d597a'];
    let roleColors = {};

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 規則 1：解析檔名中底線前的人名
        const fileName = file.name;
        const nameMatch = fileName.split('_')[0];
        docTitle.innerText = nameMatch;

        const reader = new FileReader();
        reader.onload = (ev) => render(ev.target.result, file.name);
        reader.readAsText(file);
    });

    function getRoleColor(name) {
        if (name.includes('尹昀晞')) return 'var(--user-accent)';
        if (!roleColors[name]) {
            roleColors[name] = colorPalette[Object.keys(roleColors).length % colorPalette.length];
        }
        return roleColors[name];
    }

    function render(rawText, fileKey) {
        content.innerHTML = '';
        roleColors = {}; 
        const blocks = rawText.split(/\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\]/g);
        
        blocks.forEach(fullContent => {
            if (!fullContent.trim()) return;

            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            const div = document.createElement('div');
            div.className = 'msg';

            if (match) {
                const name = match[1].trim();
                let rawMsg = match[2].trim();
                const isUser = name.includes('尹昀晞');
                const isSystem = /system|environment/i.test(name);
                
                if (isSystem) {
                    div.classList.add('role-system');
                    div.innerText = rawMsg.replace(/[\*\(\)]/g, '').trim(); 
                } else {
                    if (isUser && rawMsg.includes('---')) {
                        const parts = rawMsg.split('---');
                        rawMsg = parts[parts.length - 1].trim(); 
                    }

                    const roleColor = getRoleColor(name);
                    div.classList.add(isUser ? 'role-user' : 'role-others');
                    
                    const processedHTML = processText(rawMsg, roleColor, isUser);
                    div.innerHTML = `<div class="msg-body">${processedHTML}</div>`;
                }
                content.appendChild(div);
            }
        });
        document.getElementById('scrollBtn').style.display = 'inline-block';
        window.onscroll = () => localStorage.setItem('pos_' + fileKey, window.scrollY);
    }

    function processText(text, roleColor, isUser) {
        const narrativeRegex = /(\*.*?\*|\(.*?\))/g;
        const segments = text.split(narrativeRegex);
        let html = '';

        segments.forEach(seg => {
            if (!seg) return;
            if (seg.match(narrativeRegex)) {
                const cleanNarrative = seg.replace(/[\*\(\)]/g, '').trim();
                if (cleanNarrative) {
                    html += `<span class="narrative">${cleanNarrative}</span>`;
                }
            } else {
                const cleanSpeech = seg.trim();
                if (cleanSpeech) {
                    html += `<div class="speech-text" style="color: ${roleColor}">${cleanSpeech}</div>`;
                }
            }
        });
        return html;
    }

    document.getElementById('scrollBtn').onclick = () => {
        const savedPos = localStorage.getItem('pos_' + fileInput.files[0].name);
        if (savedPos) window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
    };
</script>
</body>
</html>
