<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天存檔閱讀器 - 言理</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --system-color: #6c757d;
            --character-bg: #ffffff;
            --user-bg: #e1f5fe;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg-color); margin: 0; color: var(--text-color); }
        
        /* 導航列 */
        #header { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 內容容器 */
        #content { max-width: 700px; margin: 20px auto; padding: 0 15px; padding-bottom: 50px; }
        
        /* 訊息樣式 */
        .msg { margin-bottom: 25px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); line-height: 1.8; position: relative; }
        .meta { font-size: 12px; color: #aaa; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; justify-content: space-between; }
        
        /* 角色區分 */
        .role-system { border-left: 5px solid #607d8b; background: #eceff1; font-style: italic; color: #546e7a; }
        .role-character { border-left: 5px solid #ff5252; background: var(--character-bg); } /* 言理 */
        .role-user { border-left: 5px solid #2196f3; background: var(--user-bg); } /* 尹昀晞 */
        
        .name { font-weight: bold; margin-bottom: 5px; color: #2c3e50; display: block; }
        .action { color: #78909c; font-size: 0.95em; } /* 星號內的動作描述 */
        
        #fileInput { cursor: pointer; }
        #scrollBtn { background: #ff5252; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <input type="file" id="fileInput" accept=".txt">
    <div id="info">
        <span id="fileName">請載入檔案</span>
        <button id="scrollBtn" style="display:none;">跳至上次進度</button>
    </div>
</div>

<div id="content">
    </div>

<script>
    const fileInput = document.getElementById('fileInput');
    const content = document.getElementById('content');
    const scrollBtn = document.getElementById('scrollBtn');
    const fileNameDisplay = document.getElementById('fileName');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        fileNameDisplay.innerText = file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            parseAndRender(event.target.result, file.name);
            scrollBtn.style.display = 'inline-block';
        };
        reader.readAsText(file);
    });

    function parseAndRender(rawText, fileKey) {
        content.innerHTML = '';
        // 依照日期時間格式分割訊息
        const msgBlocks = rawText.split(/(\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\])/g);
        
        for (let i = 1; i < msgBlocks.length; i += 2) {
            const time = msgBlocks[i];
            const fullContent = msgBlocks[i + 1] || "";
            
            const div = document.createElement('div');
            div.className = 'msg';
            
            // 解析角色名稱與文字
            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            if (match) {
                const name = match[1].trim();
                let text = match[2].trim();
                
                // 區分樣式
                if (name.includes('system') || name.includes('Environment')) {
                    div.classList.add('role-system');
                } else if (name.includes('言理')) {
                    div.classList.add('role-character');
                } else {
                    div.classList.add('role-user');
                }

                // 處理星號動作文字 (變色)
                text = text.replace(/\*(.*?)\*/g, '<span class="action">*$1*</span>');
                text = text.replace(/\n/g, '<br>');

                div.innerHTML = `
                    <div class="meta"><span>${time}</span></div>
                    <span class="name">${name}</span>
                    <div class="text">${text}</div>
                `;
            } else {
                // 如果格式不符，單純顯示文字
                div.classList.add('role-system');
                div.innerText = fullContent;
            }
            content.appendChild(div);
        }

        // 監聽捲動並存檔
        window.onscroll = function() {
            localStorage.setItem('pos_' + fileKey, window.scrollY);
        };
    }

    scrollBtn.onclick = function() {
        const savedPos = localStorage.getItem('pos_' + fileNameDisplay.innerText);
        if (savedPos) {
            window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
        }
    };
</script>

</body>
</html>
