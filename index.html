<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人對話書房</title>
    <style>
        :root {
            --paper-bg: #fdfaf5;
            --user-accent: #a63d40;
            --action-color: #8b7d6b;
        }

        body {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: "Meiryo UI", "Meiryo", "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #2c2c2c; margin: 0; line-height: 2.2; min-height: 100vh;
        }

        /* 導覽列 */
        #header {
            position: sticky; top: 0; background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(5px); border-bottom: 1px solid #e0d8cc;
            padding: 12px 20px; display: none; justify-content: space-between; align-items: center; z-index: 100;
        }

        #docTitle { font-size: 1.1em; font-weight: bold; color: #555; margin-right: auto; margin-left: 15px; }

        /* 歡迎與書櫃畫面 */
        #welcome-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 90vh; text-align: center; padding: 20px;
        }
        #welcome-text { color: #8b7d6b; margin-bottom: 25px; letter-spacing: 2px; font-size: 0.95em; }

        #bookshelf { margin-top: 40px; width: 100%; max-width: 320px; text-align: left; }
        .shelf-title { font-size: 0.85em; color: #b0a496; border-bottom: 1px solid #e0d8cc; padding-bottom: 5px; margin-bottom: 15px; letter-spacing: 1px; }
        .book-item {
            padding: 12px 15px; background: rgba(255,255,255,0.5); border: 1px solid #e0d8cc;
            border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .book-item:hover { background: #fff; border-color: var(--user-accent); transform: scale(1.02); }

        /* 彈出視窗樣式 */
        #resume-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--paper-bg); padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 300px;
        }

        /* 統一按鈕 */
        .btn-red {
            background: var(--user-accent); color: white; border: none;
            padding: 10px 25px; border-radius: 25px; cursor: pointer;
            font-size: 1em; display: inline-block; transition: 0.3s;
        }
        .btn-red:hover { opacity: 0.9; }
        #fileInput { display: none; }

        /* 閱讀區 */
        #content { max-width: 700px; margin: 40px auto; padding: 0 20px; display: none; }
        .msg { margin-bottom: 40px; }

        /* 全文字 1em */
        .speech-text, .narrative, .role-system {
            font-size: 1em; display: block; margin: 8px 0; font-style: normal;
            white-space: pre-wrap; letter-spacing: 0.8px;
        }
        .narrative { color: var(--action-color); font-weight: 400; }
        .role-user .speech-text { color: var(--user-accent); font-weight: 500; }
        .role-system { color: #b0a496; text-align: center; margin: 80px 0; }
    </style>
</head>
<body>

<div id="resume-modal">
    <div class="modal-content">
        <p style="margin-bottom: 20px; color: #555;">偵測到上次的閱讀進度，<br>要從那裡開始嗎？</p>
        <button id="confirm-resume" class="btn-red" style="margin-right: 10px;">繼續</button>
        <button id="cancel-resume" style="background:none; border:none; color:#b0a496; cursor:pointer;">從頭開始</button>
    </div>
</div>

<div id="welcome-screen">
    <div id="welcome-text">請選擇要閱讀的聊天紀錄</div>
    <label for="fileInput" class="btn-red">選擇檔案</label>
    <input type="file" id="fileInput" accept=".txt">

    <div id="bookshelf" style="display: none;">
        <div class="shelf-title">書櫃</div>
        <div id="book-list"></div>
    </div>
</div>

<div id="header">
    <button id="backToLibrary" class="btn-red" style="padding: 6px 15px; font-size: 0.85em;">回書房</button>
    <span id="docTitle"></span>
    <div style="width: 70px;"></div> <!-- 保持標題置中 -->
</div>

<div id="content"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const welcomeScreen = document.getElementById('welcome-screen');
    const header = document.getElementById('header');
    const content = document.getElementById('content');
    const docTitle = document.getElementById('docTitle');
    const bookList = document.getElementById('book-list');
    const bookshelf = document.getElementById('bookshelf');
    const resumeModal = document.getElementById('resume-modal');

    let currentPerson = "";
    let roleColors = {};
    const colorPalette = ['#5d8aa8', '#4e6e5d', '#5a4a78', '#8b5a2b', '#3d5a80', '#6d597a'];

    window.onload = updateBookshelf;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentPerson = file.name.split('_')[0];
        docTitle.innerText = currentPerson;

        const reader = new FileReader();
        reader.onload = (ev) => {
            render(ev.target.result);
            saveToHistory(currentPerson);
            switchToReadMode();
            checkResume();
        };
        reader.readAsText(file);
    });

    function saveToHistory(name) {
        let history = JSON.parse(localStorage.getItem('library_history') || '{}');
        history[name] = { lastRead: new Date().toLocaleDateString() };
        localStorage.setItem('library_history', JSON.stringify(history));
    }

    function updateBookshelf() {
        let history = JSON.parse(localStorage.getItem('library_history') || '{}');
        const names = Object.keys(history);
        if (names.length > 0) {
            bookshelf.style.display = 'block';
            bookList.innerHTML = '';
            names.reverse().forEach(name => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<span>${name}</span><small>${history[name].lastRead}</small>`;
                div.onclick = () => fileInput.click();
                bookList.appendChild(div);
            });
        }
    }

    function checkResume() {
        const savedPos = localStorage.getItem('pos_' + currentPerson);
        if (savedPos && parseInt(savedPos) > 100) {
            resumeModal.style.display = 'flex';
        }
    }

    document.getElementById('confirm-resume').onclick = () => {
        const savedPos = localStorage.getItem('pos_' + currentPerson);
        window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
        resumeModal.style.display = 'none';
    };

    document.getElementById('cancel-resume').onclick = () => {
        resumeModal.style.display = 'none';
    };

    document.getElementById('backToLibrary').onclick = () => {
        welcomeScreen.style.display = 'flex';
        header.style.display = 'none';
        content.style.display = 'none';
        updateBookshelf();
    };

    function switchToReadMode() {
        welcomeScreen.style.display = 'none';
        header.style.display = 'flex';
        content.style.display = 'block';
    }

    function render(rawText) {
        content.innerHTML = '';
        roleColors = {};
        // 分割訊息並保留舊在上的順序
        const blocks = rawText.split(/\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\]/g);
        
        blocks.forEach(fullContent => {
            if (!fullContent.trim()) return;
            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            if (match) {
                const name = match[1].trim();
                let rawMsg = match[2].trim();
                const isUser = name.includes('尹昀晞');
                const isSystem = /system|environment/i.test(name);
                
                const div = document.createElement('div');
                div.className = 'msg';

                if (isSystem) {
                    div.className = 'role-system';
                    div.innerText = rawMsg.replace(/[\*\(\)]/g, '').trim(); 
                } else {
                    if (isUser && rawMsg.includes('---')) rawMsg = rawMsg.split('---').pop().trim();
                    const roleColor = isUser ? 'var(--user-accent)' : getRoleColor(name);
                    div.innerHTML = processText(rawMsg, roleColor, isUser);
                }
                content.appendChild(div);
            }
        });
        // 監聽滾動存檔（以人名為 Key）
        window.onscroll = () => {
            if (currentPerson) localStorage.setItem('pos_' + currentPerson, window.scrollY);
        };
    }

    function getRoleColor(name) {
        if (!roleColors[name]) roleColors[name] = colorPalette[Object.keys(roleColors).length % colorPalette.length];
        return roleColors[name];
    }

    function processText(text, roleColor, isUser) {
        const narrativeRegex = /(\*.*?\*|\(.*?\))/g;
        return text.split(narrativeRegex).map(seg => {
            if (!seg || !seg.trim()) return '';
            if (seg.match(narrativeRegex)) {
                return `<span class="narrative">${seg.replace(/[\*\(\)]/g, '').trim()}</span>`;
            } else {
                return `<div class="speech-text" style="color: ${roleColor}">${seg.trim()}</div>`;
            }
        }).join('');
    }
</script>
</body>
</html>
