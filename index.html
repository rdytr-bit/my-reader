<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言理存檔：小說式閱讀器</title>
    <style>
        :root {
            --paper-bg: #fdfaf5;
            --main-accent: #a63d40; /* 緋紅 */
            --user-accent: #5d8aa8; /* 水色 */
            --action-color: #8b7d6b; /* 咖啡色 */
        }

        body {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: "PingFang TC", "Noto Serif TC", "Microsoft JhengHei", serif;
            color: #2c2c2c;
            margin: 0;
            line-height: 1.8;
        }

        #header {
            position: sticky; top: 0; background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(5px); border-bottom: 1px solid #e0d8cc;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        #content { max-width: 650px; margin: 40px auto; padding: 0 20px; }

        .msg { margin-bottom: 50px; opacity: 0; animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .meta { font-size: 11px; color: #b0a496; text-align: center; margin-bottom: 15px; }
        .name { font-weight: 600; font-size: 1.1em; display: block; margin-bottom: 10px; }

        /* 外框定義：僅對話使用 */
        .speech-bubble {
            padding: 12px 18px;
            border-radius: 4px;
            display: inline-block;
            margin: 5px 0;
            font-size: 1.05em;
            white-space: pre-wrap;
        }

        /* 角色顏色分配 */
        .role-hero .name { color: var(--main-accent); }
        .role-hero .speech-bubble { 
            background: rgba(166, 61, 64, 0.05); 
            border: 1px solid var(--main-accent); 
        }

        .role-user .name { color: var(--user-accent); }
        .role-user .speech-bubble { 
            background: rgba(93, 138, 168, 0.05); 
            border: 1px solid var(--user-accent); 
        }

        /* 動作與描述：咖啡色、斜體、不帶框 */
        .narrative {
            color: var(--action-color);
            font-style: italic;
            display: block;
            margin: 8px 0;
            font-weight: 300;
        }

        .role-system { text-align: center; font-size: 0.95em; color: #8c8c8c; margin: 50px 0; font-style: italic; }

        #scrollBtn { background: var(--main-accent); color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <input type="file" id="fileInput" accept=".txt">
    <div>
        <span id="heroName" style="font-size: 12px; font-weight: bold; margin-right: 10px;"></span>
        <button id="scrollBtn" style="display:none;">續讀</button>
    </div>
</div>

<div id="content"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const content = document.getElementById('content');
    const heroDisplay = document.getElementById('heroName');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const rawText = event.target.result;
            const hero = detectHero(rawText);
            heroDisplay.innerText = "主導角色：" + hero;
            render(rawText, hero, file.name);
            document.getElementById('scrollBtn').style.display = 'inline-block';
        };
        reader.readAsText(file);
    });

    function detectHero(text) {
        const nameCount = {};
        const matches = text.matchAll(/^\s*(.*?):\s*/gm);
        for (const match of matches) {
            const name = match[1].trim();
            if (!/system|environment|尹昀晞/i.test(name)) {
                nameCount[name] = (nameCount[name] || 0) + 1;
            }
        }
        return Object.keys(nameCount).reduce((a, b) => nameCount[a] > nameCount[b] ? a : b, "未知角色");
    }

    function render(rawText, heroName, fileKey) {
        content.innerHTML = '';
        const blocks = rawText.split(/(\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\])/g);
        
        for (let i = 1; i < blocks.length; i += 2) {
            const time = blocks[i];
            const fullContent = blocks[i + 1] || "";
            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            
            if (match) {
                const name = match[1].trim();
                const rawMsg = match[2].trim();
                const div = document.createElement('div');
                div.className = 'msg ' + (name === heroName ? 'role-hero' : name.includes('尹昀晞') ? 'role-user' : 'role-system');

                // 核心解析邏輯：將文字拆解為「框內對話」與「框外描述」
                const processedHTML = processText(rawMsg);
                
                div.innerHTML = `<div class="meta">${time}</div><span class="name">${name}</span>${processedHTML}`;
                content.appendChild(div);
            }
        }
        window.onscroll = () => localStorage.setItem('pos_' + fileKey, window.scrollY);
    }

    function processText(text) {
        // 先處理星號與括弧包圍的「動作」 (加上括弧版)
        // 匹配: *...*, (...), (*...*), (*...*)
        const narrativeRegex = /(\*.*?\*|\(.*?\))/g;
        
        // 根據 Regex 切分文字
        const segments = text.split(narrativeRegex);
        let finalHTML = '';

        segments.forEach(seg => {
            if (!seg) return;
            if (narrativeRegex.test(seg)) {
                // 這是動作描述 -> 咖啡色斜體，無框
                finalHTML += `<span class="narrative">${seg}</span>`;
            } else {
                // 這是對話或引號文字 -> 加上對應顏色的框
                const cleanText = seg.trim();
                if (cleanText) {
                    finalHTML += `<div class="speech-bubble">${cleanText}</div>`;
                }
            }
            narrativeRegex.lastIndex = 0; // 重置 regex 狀態
        });

        return finalHTML;
    }

    document.getElementById('scrollBtn').onclick = () => {
        const savedPos = localStorage.getItem('pos_' + fileInput.files[0].name);
        if (savedPos) window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
    };
</script>
</body>
</html>
