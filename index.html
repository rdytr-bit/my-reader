<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對話小說閱讀器</title>
    <style>
        :root {
            --paper-bg: #fdfaf5;
            --user-accent: #a63d40; /* 尹昀晞現在是緋紅色 */
            --action-color: #8b7d6b; /* 咖啡色 */
        }

        body {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: "PingFang TC", "Noto Serif TC", "Microsoft JhengHei", serif;
            color: #2c2c2c; margin: 0; line-height: 1.8;
        }

        #header {
            position: sticky; top: 0; background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(5px); border-bottom: 1px solid #e0d8cc;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        #content { max-width: 700px; margin: 30px auto; padding: 0 20px; text-align: left; }

        .msg { margin-bottom: 45px; text-align: left; opacity: 0; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .meta { font-size: 11px; color: #b0a496; margin-bottom: 12px; display: block; }
        .name { font-weight: bold; font-size: 1.15em; display: block; margin-bottom: 8px; }

        /* 對話框樣式 */
        .speech-bubble {
            padding: 10px 16px;
            border-radius: 6px;
            display: inline-block;
            margin: 4px 0;
            border: 1px solid transparent;
            white-space: pre-wrap;
            max-width: 90%;
        }

        /* 尹昀晞專屬：緋紅框 */
        .role-user .name { color: var(--user-accent); }
        .role-user .speech-bubble { 
            border-color: var(--user-accent); 
            background: rgba(166, 61, 64, 0.04); 
        }

        /* 其他角色通用框：預設水藍色調起頭 */
        .role-others .speech-bubble {
            border: 1px solid currentColor; /* 自動抓取名字顏色 */
            background: rgba(0, 0, 0, 0.02);
        }

        .narrative {
            color: var(--action-color);
            font-style: italic;
            display: block;
            margin: 6px 0;
            font-weight: 400;
            font-size: 0.98em;
        }

        .role-system { color: #8c8c8c; font-size: 0.9em; border-left: 2px solid #ddd; padding-left: 15px; margin: 30px 0; }

        #scrollBtn { background: var(--user-accent); color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <input type="file" id="fileInput" accept=".txt">
    <button id="scrollBtn" style="display:none;">續讀位置</button>
</div>

<div id="content"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const content = document.getElementById('content');
    // 其他角色的調色盤，從水藍色開始
    const colorPalette = ['#5d8aa8', '#4e6e5d', '#5a4a78', '#8b5a2b', '#3d5a80', '#6d597a'];
    let roleColors = {};

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => render(ev.target.result, file.name);
        reader.readAsText(file);
    });

    function getRoleColor(name) {
        if (name.includes('尹昀晞')) return 'var(--user-accent)';
        if (!roleColors[name]) {
            roleColors[name] = colorPalette[Object.keys(roleColors).length % colorPalette.length];
        }
        return roleColors[name];
    }

    function render(rawText, fileKey) {
        content.innerHTML = '';
        roleColors = {}; 
        const blocks = rawText.split(/(\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\])/g);
        
        for (let i = 1; i < blocks.length; i += 2) {
            const time = blocks[i];
            const fullContent = blocks[i + 1] || "";
            const match = fullContent.match(/^\s*(.*?):\s*([\s\S]*)$/);
            
            const div = document.createElement('div');
            div.className = 'msg';

            if (match) {
                const name = match[1].trim();
                const rawMsg = match[2].trim();
                const isUser = name.includes('尹昀晞');
                const isSystem = /system|environment/i.test(name);
                
                if (isSystem) {
                    div.classList.add('role-system');
                    div.innerHTML = `<span class="meta">${time}</span><strong>${name}</strong><br>${rawMsg}`;
                } else {
                    const roleColor = getRoleColor(name);
                    if (isUser) {
                        div.classList.add('role-user');
                    } else {
                        div.classList.add('role-others');
                    }
                    
                    const processedHTML = processText(rawMsg);
                    div.innerHTML = `
                        <span class="meta">${time}</span>
                        <span class="name" style="color: ${roleColor}">${name}</span>
                        <div class="msg-body" style="color: ${isUser ? 'inherit' : roleColor}">${processedHTML}</div>
                    `;
                }
            }
            content.appendChild(div);
        }
        document.getElementById('scrollBtn').style.display = 'inline-block';
        window.onscroll = () => localStorage.setItem('pos_' + fileKey, window.scrollY);
    }

    function processText(text) {
        const narrativeRegex = /(\*.*?\*|\(.*?\))/g;
        const segments = text.split(narrativeRegex);
        let html = '';

        segments.forEach(seg => {
            if (!seg) return;
            if (seg.match(narrativeRegex)) {
                const cleanNarrative = seg.replace(/[\*\(\)]/g, '').trim();
                if (cleanNarrative) {
                    html += `<span class="narrative">${cleanNarrative}</span>`;
                }
            } else {
                const cleanSpeech = seg.trim();
                if (cleanSpeech) {
                    html += `<div class="speech-bubble">${cleanSpeech}</div>`;
                }
            }
        });
        return html;
    }

    document.getElementById('scrollBtn').onclick = () => {
        const savedPos = localStorage.getItem('pos_' + fileInput.files[0].name);
        if (savedPos) window.scrollTo({ top: parseInt(savedPos), behavior: 'smooth' });
    };
</script>
</body>
</html>
